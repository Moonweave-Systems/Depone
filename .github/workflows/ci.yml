name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    name: unit (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.12']
    steps:
      - name: Checkout Depone
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -p 'test_*.py'

  package-self-test:
    name: package self-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Depone
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Run contract package self-test
        run: python3 -m depone validate-contracts --self-test

      - name: Run package doctor self-test
        run: python3 -m depone doctor --self-test

  conformance:
    name: public reverse conformance (Depone re-derives witnessd fixtures)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Depone
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Clone witnessd
        run: |
          set -euo pipefail
          git clone --depth=1 https://github.com/Moonweave-Systems/witnessd.git "$RUNNER_TEMP/witnessd"

      - name: Re-derive all committed witnessd fixtures with this Depone
        working-directory: ${{ runner.temp }}/witnessd
        env:
          PYTHONPATH: ${{ github.workspace }}
          WITNESSD_DEPONE_ROOT: ${{ github.workspace }}
        run: |
          set -euo pipefail
          for script in scripts/revalidate_*.py; do
            echo "== ${script} =="
            python3 "${script}"
          done
