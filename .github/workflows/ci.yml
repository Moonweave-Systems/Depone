name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: unit (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.12']
    steps:
      - name: Checkout Depone
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -p 'test_*.py'

  package-self-test:
    name: package self-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Depone
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run contract package self-test
        run: python3 -m depone validate-contracts --self-test

      - name: Run package doctor self-test
        run: python3 -m depone doctor --self-test

  conformance:
    name: witnessd reverse conformance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Depone
        uses: actions/checkout@v4

      - name: Check reverse conformance token
        id: reverse-token
        env:
          WITNESSD_REVERSE_CONFORMANCE_PAT: ${{ secrets.WITNESSD_REVERSE_CONFORMANCE_PAT }}
        run: |
          set -euo pipefail
          if [ -z "${WITNESSD_REVERSE_CONFORMANCE_PAT:-}" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "WITNESSD_REVERSE_CONFORMANCE_PAT is not configured; skipping private reverse conformance."
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone witnessd
        if: steps.reverse-token.outputs.available == 'true'
        env:
          WITNESSD_REVERSE_CONFORMANCE_PAT: ${{ secrets.WITNESSD_REVERSE_CONFORMANCE_PAT }}
        run: |
          set -euo pipefail
          git -c http.extraheader="AUTHORIZATION: bearer ${WITNESSD_REVERSE_CONFORMANCE_PAT}" \
            clone --depth=1 https://github.com/Moonweave-Systems/witnessd.git "$RUNNER_TEMP/witnessd"

      - name: Set up Python
        if: steps.reverse-token.outputs.available == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Re-derive witnessd W1 fixture with this Depone
        if: steps.reverse-token.outputs.available == 'true'
        working-directory: ${{ runner.temp }}/witnessd
        run: PYTHONPATH="$GITHUB_WORKSPACE" python3 scripts/revalidate_w1.py
